function coverRoleTokens(value){let s=norm(String(value||'').replace(/^\s*Swing\s*[—-]\s*/i,'')).replace(/\bensemble\b/g,' ').replace(/\s+/g,' ').trim();if(!s)return[];let pieces=s.split(/\s*(?:\/|,|&|\band\b)\s*/).map(x=>x.trim()).filter(Boolean);return [...new Set([s].concat(pieces))];}

function cueCreditLabel(c){return String(c.label||c.row?.credit||c.row?.category||c.row?.role||c.row?.chair||c.cat||'Credit').replace(/\s+/g,' ').trim();}
function cueCreditGroup(c){
  let cat=norm(c.cat||''),label=norm(cueCreditLabel(c));
  if(cat==='orchestra')return'Orchestra';
  if(cat.includes('originating theatre staff')||cat.includes('production vendors'))return'Production Staff';
  const productionFirst=/(stage manager|production manager|technical director|director of production|marketing director|casting director|company manager|general manager|board operator|follow spot|carpenter|electrician|dresser|wardrobe|costume director|producer|intern|consultant|location|press|marketing|advertising|business|payroll|legal|insurance)/;
  if(productionFirst.test(label))return'Production Staff';
  if(cat==='associate creative team'||cat==='dance captains'||cat==='fight captains')return'Additional Creative';
  if(/associate|assistant|resident|additional|captain|consultant/.test(label))return'Additional Creative';
  const majorExact=['book','based on','music','lyrics','playwright','composer','lyricist','director','fight director','choreographer','choreography','music director','musical director','music direction','musical direction','music supervisor','music supervision','scenic design','set design','costume design','lighting design','sound design','projection design','video design','hair wig','hair and wig design','wig design','makeup design','orchestration','orchestrations','arrangement','arrangements','vocal arrangements','dance arrangements','dramaturg','dramaturgy','casting'];
  if(majorExact.some(x=>label===x||label.startsWith(x+' ')||label.endsWith(' '+x)))return'Creative Team';
  if(cat==='music staff'&&/(conductor|music director|musical director|music supervisor|music supervision)/.test(label))return'Creative Team';
  return'Production Staff';
}

  let roleIndex=new Map(roles.map((name,i)=>[name,i]));

    for(let a of (perfApps.get(p.id)||[])){
      let rawRole=roleBaseName(a.roleId);
