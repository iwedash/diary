</style><script src="data-loader.js?v=json-b169"></script></head><body><header class="top"><div class="topin"><div class="brand">Logo Manager</div><span class="spacer"></span><details class="toolMenu"><summary>Menu</summary><div class="toolMenuPanel"><a href="index.html?v=json-b169">Dashboard</a><a href="souvenir.html?v=json-b169">Souvenir Program</a><a href="castbook.html?v=json-b169">Cast Book</a><a href="companions.html?v=json-b169">Companions</a><a href="qa.html?v=json-b169">Data Health</a><a href="logo-manager.html?v=json-b169">Logo Manager</a><small>B169 · v13.3.0</small></div></details></div></header><main class="wrap"><section class="hero"><h1>Logo Manager</h1><p class="hint">This page is a map for the <code>/logos/</code> folder. Drop image files into that folder in GitHub using one of the names below. The Program Studio checks them in order.</p><input id="filter" class="input" placeholder="Filter shows…"><div class="tools"><button id="copyAll" class="btn">Copy missing logo checklist</button><button id="downloadCsv" class="btn light">Download CSV</button></div></section><section class="grid" id="grid"></section></main><script>
let DB=null; const $=id=>document.getElementById(id); function vals(o){return Array.isArray(o)?o:Object.values(o||{})} function norm(s){return String(s||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,' ').trim()} function slug(s){return norm(s).replace(/\s+/g,'-')} function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function perfsByShow(){let m={}; vals(DB.performances).forEach(p=>{(m[p.showId]||(m[p.showId]=[])).push(p)}); return m}
function candidates(s){return [`logos/show-${s.id}.png`,`logos/${s.id}.png`,`logos/${slug(s.title)}.png`,`logos/${slug(s.title)}.jpg`,`logos/${slug(s.title)}.webp`]}
function render(){let q=norm($('filter').value), pbs=perfsByShow(); let shows=vals(DB.shows).filter(s=>(pbs[s.id]||[]).length&&(!q||norm(s.title).includes(q))).sort((a,b)=>(a.title||'').localeCompare(b.title||'')); $('grid').innerHTML=shows.map(s=>`<article class="card logoCard"><h3>${esc(s.title)}</h3><div class="tiny">${(pbs[s.id]||[]).length} performances · show ID ${s.id}</div><div class="fileList">${candidates(s).map(x=>`<code>${esc(x)}</code>`).join('<br>')}</div><span class="chip">Use first matching file</span></article>`).join('')}
function checklist(){let pbs=perfsByShow(); return vals(DB.shows).filter(s=>(pbs[s.id]||[]).length).sort((a,b)=>(a.title||'').localeCompare(b.title||'')).map(s=>`${s.title}: logos/${slug(s.title)}.png`).join('\n')}
async function init(){DB=await loadCuebookData({cache:'no-store'}); render(); $('filter').addEventListener('input',render); $('copyAll').onclick=()=>navigator.clipboard.writeText(checklist()); $('downloadCsv').onclick=()=>{let pbs=perfsByShow(); let rows=['showId,title,preferredLogo,alternate1,alternate2'].concat(vals(DB.shows).filter(s=>(pbs[s.id]||[]).length).map(s=>[s.id,'"'+String(s.title).replace(/"/g,'""')+'"',...candidates(s).slice(0,3)].join(','))); let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'})); a.download='theatre-diary-logo-checklist.csv'; a.click()}}
init().catch(e=>{$('grid').innerHTML='<section class="card">Could not load Cuebook split data</section>'})
</script></body></html>
