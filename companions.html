<html lang="en"><head><meta charset="utf-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cuebook · Companions</title>
<style>
:root{--plum:#241728;--berry:#6b263f;--gold:#f2c84b;--ivory:#fff8ec;--blush:#f3e3df;--ink:#151216;--muted:#746a63;--line:rgba(36,23,40,.16);--white:#fffdf8}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0%,#fff7a8 0,transparent 28%),linear-gradient(135deg,var(--ivory),#f7efe2);color:var(--ink);font-family:Arial,sans-serif}.top{background:var(--plum);color:white;position:sticky;top:0;z-index:5;box-shadow:0 3px 18px #2417282b}.topin{max-width:1240px;margin:auto;padding:14px 22px;display:flex;align-items:center;gap:14px}.brand{font-family:"Arial Narrow",Arial,sans-serif;font-weight:900;letter-spacing:.12em;text-transform:uppercase;font-size:23px}.tag{font-size:12px;color:#eadfe5}.spacer{flex:1}.menu a{color:white;text-decoration:none;border:1px solid #ffffff40;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:800}.wrap{max-width:1240px;margin:0 auto;padding:28px 22px 70px}.hero{background:linear-gradient(130deg,var(--berry),var(--plum));color:white;border-radius:28px;padding:32px;box-shadow:0 18px 50px #24172825;position:relative;overflow:hidden}.hero:after{content:"♪";position:absolute;right:24px;top:-28px;font-size:180px;color:#ffffff0d;transform:rotate(-8deg)}h1{font-family:"Arial Narrow",Arial,sans-serif;font-size:clamp(46px,8vw,92px);line-height:.82;margin:0;text-transform:uppercase;letter-spacing:-.035em}.subtitle{font-family:Georgia,serif;font-size:20px;font-style:italic;margin:14px 0 0;color:#ffe78d}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px}.stat{background:#ffffff10;border:1px solid #ffffff25;border-radius:16px;padding:13px}.stat b{display:block;font-size:28px}.stat span{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:#f5e7ea}.controls{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0}.controls input,.controls select{background:var(--white);border:1px solid var(--line);border-radius:999px;padding:12px 16px;font:inherit;min-height:44px}.controls input{flex:1;min-width:220px}.section{background:#fffdf9cc;border:1px solid var(--line);border-radius:24px;padding:20px;margin-top:18px;box-shadow:0 9px 28px #2417280c}.section h2{font-family:"Arial Narrow",Arial,sans-serif;text-transform:uppercase;letter-spacing:.04em;margin:0 0 14px;font-size:26px}.cards{display:flex;flex-direction:column;gap:7px;max-width:100%}.card{width:100%;border:1px solid var(--line);background:white;border-radius:14px;padding:12px 15px;text-align:left;cursor:pointer;display:grid;grid-template-columns:24px minmax(170px,auto) minmax(0,1fr) 42px;gap:10px;transition:.15s;align-items:center}.card:hover{transform:translateY(-2px);border-color:var(--berry);box-shadow:0 8px 22px #6b263f18}.card:before{content:"▸";font-size:16px;color:var(--berry)}.card strong{font-family:"Arial Narrow",Arial,sans-serif;text-transform:uppercase;font-size:17px;letter-spacing:.025em;white-space:nowrap}.card .count{grid-column:4;background:var(--plum);color:white;border:2px solid var(--gold);border-radius:999px;min-width:35px;height:35px;display:grid;place-items:center;font-weight:900}.card small{color:var(--muted);white-space:normal;line-height:1.25}.detail{display:none}.detail.open{display:block}.detailHead{display:flex;align-items:end;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px}.detailHead h2{margin:0;font-size:36px}.pill{border-radius:999px;background:#fff4bc;border:1px solid #e0c357;padding:5px 9px;font-size:10px;font-weight:900;text-transform:uppercase}.history{margin-top:8px}.historyRow{display:grid;grid-template-columns:120px minmax(0,1fr) auto;gap:12px;padding:12px 6px;border-bottom:1px solid var(--line);align-items:center}.historyRow a{font-family:"Arial Narrow",Arial,sans-serif;font-size:17px;font-weight:850;text-transform:uppercase;color:var(--ink);text-decoration:none}.historyRow a:hover{text-decoration:underline}.meta{color:var(--muted);font-size:12px}.kind{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.07em;border:1px solid var(--line);border-radius:999px;padding:5px 8px}.also{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}.empty{text-align:center;color:var(--muted);padding:30px}.loading{padding:80px 20px;text-align:center;font-weight:800}.footer{text-align:center;color:var(--muted);font-size:10px;margin-top:28px;letter-spacing:.1em;text-transform:uppercase}
@media(max-width:720px){.card{grid-template-columns:20px minmax(0,1fr) 38px}.card small{grid-column:2/4}.card .count{grid-column:3;grid-row:1}.card strong{white-space:normal}.tag{display:none}.wrap{padding:16px 12px 50px}.hero{padding:24px 20px;border-radius:22px}.stats{grid-template-columns:1fr 1fr}.section{padding:15px;border-radius:19px}.historyRow{grid-template-columns:1fr auto}.historyRow .date{grid-column:1/3;font-size:10px}.menu a:not(:first-child){display:none}}
</style><script src="data-loader.js?v=json-b165"></script></head><body>
<header class="top"><div class="topin"><div class="brand">Cuebook</div><div class="tag">Companions</div><div class="spacer"></div><nav class="menu"><a href="index.html?v=json-b165">Dashboard</a> <a href="souvenir.html?v=json-b165">Souvenir</a> <a href="castbook.html?v=json-b165">Cast Book</a></nav></div></header>
<main class="wrap" id="app"><div class="loading">Finding the people in the next seat…</div></main>
<script>
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const norm=s=>String(s||'').normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
const fmt=d=>{try{return new Date(d+'T12:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}catch{return d||''}};
let DB, companions=[], selected='', query='', kind='all', sort='count', companionSummary={withCount:0,links:0,groups:0};
function vals(o){return o&&typeof o==='object'?Object.values(o):[]}
function indexData(){
 const perfs=DB.performances||{}, shows=DB.shows||{}, venues=DB.venues||{}, people=DB.people||{};
 const map=new Map(), links=Array.isArray(DB.companionLinks)?DB.companionLinks:[], linkedPerfIds=new Set();
 const byPerf=new Map();
 links.forEach(link=>{let perfId=String(link.performanceId);if(!perfs[perfId])return;if(!byPerf.has(perfId))byPerf.set(perfId,[]);byPerf.get(perfId).push(link);linkedPerfIds.add(perfId)});
 function addEvent(p,person,display,group,key){
   if(!p||!display)return;
   let rec=map.get(key)||{key,name:display,events:[],person:person||null};
   if(person)rec.name=person.name||person.displayName||rec.name;
   let sh=shows[String(p.showId)]||{},ve=venues[String(p.venueId)]||{};
   rec.events.push({p,show:sh.title||sh.name||'Unknown show',venue:ve.name||'',group,ticket:p.ticketType||'',markers:p.experienceMarkers||[]});
   map.set(key,rec);
 }
 byPerf.forEach((rows,perfId)=>{
   const p=perfs[perfId], unique=[], seen=new Set();
   rows.forEach(link=>{let person=people[String(link.personId)]||null,display=link.displayName||person?.name||person?.displayName||`Person ${link.personId}`,key=person?`person:${person.id}`:`name:${norm(display)}`;if(!seen.has(key)){seen.add(key);unique.push({person,display,key})}});
   unique.forEach(x=>addEvent(p,x.person,x.display,unique.length,x.key));
 });
 // Legacy fallback: retain any string-only companion records not represented in companionLinks.
 vals(perfs).forEach(p=>{
   if(linkedPerfIds.has(String(p.id)))return;
   const names=[...new Set((p.attendedWith||[]).filter(Boolean).map(String))];
   names.forEach(display=>{let person=vals(people).find(x=>norm(x.name)===norm(display)||(x.aliases||[]).some(a=>norm(a)===norm(display)))||null,key=person?`person:${person.id}`:`name:${norm(display)}`;addEvent(p,person,display,names.length,key)});
 });
 const apps=DB.appearances||[],credits=DB.creativeCredits||[];
 map.forEach(r=>{if(r.person){let pid=String(r.person.id);r.onstage=new Set(apps.filter(a=>String(a.personId)===pid).map(a=>a.performanceId)).size;r.creative=new Set(credits.filter(c=>String(c.personId)===pid).map(c=>c.performanceId)).size}else{r.onstage=0;r.creative=0}r.events.sort((a,b)=>String(a.p.date).localeCompare(String(b.p.date)));r.count=r.events.length;r.shows=new Set(r.events.map(e=>e.show)).size;r.broadway=r.events.filter(e=>/^Broadway$/i.test(e.p.type||'')).length;r.regional=r.events.filter(e=>/regional/i.test(e.p.type||'')).length;r.rush=r.events.filter(e=>/rush/i.test(e.ticket)||e.markers.some(m=>/rush/i.test(m))).length;r.comp=r.events.filter(e=>/comp/i.test(e.ticket)||e.markers.some(m=>/comp/i.test(m))).length;r.opening=r.events.filter(e=>e.markers.some(m=>/opening/i.test(m))).length});
 companions=[...map.values()];
 companionSummary={withCount:byPerf.size,links:links.length,groups:[...byPerf.values()].filter(rows=>new Set(rows.map(r=>String(r.personId))).size>1).length};
}
function filtered(){let a=companions.filter(r=>!query||norm(r.name).includes(norm(query))||r.events.some(e=>norm(e.show).includes(norm(query))));if(kind==='broadway')a=a.filter(r=>r.broadway);if(kind==='regional')a=a.filter(r=>r.regional);if(kind==='rush')a=a.filter(r=>r.rush);if(kind==='comp')a=a.filter(r=>r.comp);if(kind==='ensemble')a=a.filter(r=>r.events.some(e=>e.group>1));a.sort(sort==='alpha'?(x,y)=>x.name.localeCompare(y.name):sort==='shows'?(x,y)=>y.shows-x.shows||y.count-x.count:(x,y)=>y.count-x.count||x.name.localeCompare(y.name));return a}
function card(r){return `<button class="card" data-name="${esc(r.key)}"><strong>${esc(r.name)}</strong><span class="count">${r.count}</span><small>${r.shows} unique show${r.shows===1?'':'s'} · ${fmt(r.events[0]?.p.date)} to ${fmt(r.events[r.events.length-1]?.p.date)}</small></button>`}
function detail(r){if(!r)return '';let tags=[];if(r.broadway)tags.push(`${r.broadway} Broadway`);if(r.regional)tags.push(`${r.regional} regional`);if(r.rush)tags.push(`${r.rush} rush`);if(r.comp)tags.push(`${r.comp} comp`);let rows=r.events.map(e=>`<div class="historyRow"><div class="date meta">${fmt(e.p.date)} · ${esc(e.p.time||'')}</div><div><a href="index.html?v=json-b165#perf-${e.p.id}">${esc(e.show)}</a><div class="meta">${esc(e.venue)}${e.p.seatLocation?.display?' · '+esc(e.p.seatLocation.display):''}</div></div><div class="kind">${esc(e.p.type||'Theatre')}</div></div>`).join('');return `<section class="section detail open"><div class="detailHead"><h2>${esc(r.name)}</h2><span class="pill">${r.count} performance${r.count===1?'':'s'}</span><span class="pill">${r.shows} unique show${r.shows===1?'':'s'}</span></div><div class="also">${tags.map(x=>`<span class="pill">${esc(x)}</span>`).join('')}${r.onstage?`<span class="pill">Also onstage: ${r.onstage}</span>`:''}${r.creative?`<span class="pill">Also credited: ${r.creative}</span>`:''}</div><div class="history">${rows}</div></section>`}
function render(){let a=filtered(),sel=companions.find(r=>r.key===selected)||companions.find(r=>norm(r.name)===norm(selected));document.getElementById('app').innerHTML=`<section class="hero"><h1>Companions</h1><div class="stats"><div class="stat"><b>${companionSummary.withCount}</b><span>shared performances</span></div><div class="stat"><b>${companions.length}</b><span>distinct companions</span></div><div class="stat"><b>${companionSummary.links}</b><span>seatmate links</span></div><div class="stat"><b>${companionSummary.groups}</b><span>ensemble outings</span></div></div></section><div class="controls"><input id="q" placeholder="Search people or shows" value="${esc(query)}"><select id="kind"><option value="all">All outings</option><option value="broadway">Broadway buddies</option><option value="regional">Regional regulars</option><option value="rush">Rush hour</option><option value="comp">Comp club</option><option value="ensemble">The ensemble</option></select><select id="sort"><option value="count">Most seen together</option><option value="shows">Most unique shows</option><option value="alpha">Alphabetical</option></select></div><section class="section"><h2>${query?'Search Results':'Companions'}</h2><div class="cards">${a.length?a.map(r=>card(r)+(sel?.key===r.key?detail(r):'')).join(''):'<div class="empty">No companions found.</div>'}</div></section><div class="footer">Cuebook · B165 · v13.1.0 · normalized companion links</div>`;document.getElementById('kind').value=kind;document.getElementById('sort').value=sort;document.getElementById('q').addEventListener('input',e=>{query=e.target.value;render()});document.getElementById('kind').addEventListener('change',e=>{kind=e.target.value;render()});document.getElementById('sort').addEventListener('change',e=>{sort=e.target.value;render()});document.querySelectorAll('.card').forEach(b=>b.addEventListener('click',()=>{selected=b.dataset.name;history.replaceState(null,'','#companion='+encodeURIComponent(selected));render()}))}
loadCuebookData({cache:'no-store'}).then(d=>{DB=d;indexData();let h=new URLSearchParams(location.hash.replace(/^#/,''));selected=h.get('companion')||'';render()}).catch(e=>document.getElementById('app').innerHTML=`<div class="loading">Could not load companions: ${esc(e.message)}</div>`)
</script></body></html>
